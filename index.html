<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>🎯 Dart Arena | Singleplayer & Multiplayer</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* {
  box-sizing: border-box;
  user-select: none;
}

body {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e1b2f 100%);
  color: #fff;
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  width: 100%;
  margin: auto;
  background: rgba(15, 23, 42, 0.7);
  backdrop-filter: blur(10px);
  border-radius: 32px;
  padding: 20px;
  box-shadow: 0 25px 45px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
}

h1 {
  text-align: center;
  font-size: 2rem;
  margin: 0 0 10px 0;
  background: linear-gradient(135deg, #fbbf24, #ef4444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Menu Styles */
.menu-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 20px 0;
}

.menu-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.menu-btn {
  flex: 1;
  min-width: 160px;
  padding: 18px 24px;
  font-size: 1.3rem;
  font-weight: bold;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: #1e293b;
  color: white;
  box-shadow: 0 5px 0 #0f172a;
}

.menu-btn:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #0f172a;
}

.menu-btn.primary {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  box-shadow: 0 5px 0 #15803d;
}

.menu-btn.secondary {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  box-shadow: 0 5px 0 #1e40af;
}

.back-btn {
  background: #334155;
  padding: 10px 20px;
  font-size: 0.9rem;
  margin-top: 15px;
}

.player-select {
  background: #1e293b;
  border-radius: 24px;
  padding: 20px;
  text-align: center;
  margin-top: 20px;
}

.player-options {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin: 20px 0;
}

.player-opt {
  flex: 1;
  padding: 20px;
  font-size: 1.5rem;
  font-weight: bold;
  background: #334155;
  border: 2px solid #475569;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.player-opt:hover {
  background: #3b82f6;
  transform: scale(1.02);
}

/* Game Styles */
.player {
  background: #1e293b;
  margin: 12px 0;
  padding: 16px;
  border-radius: 24px;
  transition: 0.2s;
  border: 2px solid #334155;
}

.active {
  border: 3px solid #22c55e;
  background: #2d3a4e;
  transform: scale(1.01);
  box-shadow: 0 0 15px rgba(34,197,94,0.3);
}

.score {
  font-size: 56px;
  font-weight: bold;
  text-align: center;
  font-family: monospace;
  letter-spacing: 2px;
  background: #0f172a;
  display: inline-block;
  padding: 5px 20px;
  border-radius: 40px;
  margin: 10px 0;
}

.stats {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

button {
  padding: 12px 20px;
  margin: 6px;
  border-radius: 40px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  border: none;
  background: #3b82f6;
  color: white;
  transition: 0.1s;
}

button:active {
  transform: scale(0.97);
}

button:disabled {
  opacity: 0.5;
  transform: none;
  cursor: not-allowed;
}

input {
  padding: 14px 16px;
  border-radius: 60px;
  border: none;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  background: #0f172a;
  color: white;
  width: 140px;
  outline: none;
  border: 1px solid #475569;
}

.status {
  margin-top: 12px;
  font-size: 13px;
  opacity: 0.7;
  text-align: center;
  background: #00000040;
  padding: 8px;
  border-radius: 40px;
}

.control-group {
  background: #0f172a;
  padding: 15px;
  border-radius: 24px;
  margin-top: 15px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  align-items: center;
}

.check-label {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #1e293b;
  padding: 8px 16px;
  border-radius: 40px;
  cursor: pointer;
}

#doubleCheck {
  width: 20px;
  height: 20px;
  cursor: pointer;
}

h3, h2 {
  margin: 8px 0;
  text-align: center;
}

#myId {
  font-size: 14px;
  word-break: break-all;
  background: #00000050;
  padding: 10px;
  border-radius: 40px;
}

.hidden {
  display: none;
}

.leg-set {
  font-size: 14px;
  background: #00000040;
  display: inline-block;
  padding: 4px 12px;
  border-radius: 40px;
}
</style>
</head>
<body>

<div class="container" id="app">
  <h1>🎯 DART ARENA</h1>
  
  <!-- MAIN MENU -->
  <div id="mainMenu" class="menu-container">
    <div class="menu-buttons">
      <button class="menu-btn primary" onclick="showSingleplayerMenu()">🎮 SINGLEPLAYER</button>
      <button class="menu-btn secondary" onclick="showMultiplayerMenu()">🌐 MULTIPLAYER</button>
    </div>
  </div>

  <!-- SINGLEPLAYER MODE MENU -->
  <div id="singleMenu" class="hidden">
    <div class="player-select">
      <h2>👥 Odaberi broj igrača</h2>
      <div class="player-options">
        <div class="player-opt" onclick="startSingleplayer(1)">1 Igrač<br><span style="font-size:14px">vs AI</span></div>
        <div class="player-opt" onclick="startSingleplayer(2)">2 Igrača<br><span style="font-size:14px">Hot Seat</span></div>
      </div>
      <button class="back-btn" onclick="backToMain()">← Nazad</button>
    </div>
  </div>

  <!-- MULTIPLAYER MODE MENU -->
  <div id="multiMenu" class="hidden">
    <div class="player-select">
      <h2>🌐 P2P Multiplayer</h2>
      <button class="menu-btn primary" style="width:100%; margin-bottom:12px" onclick="createGame()">✨ Create Game</button>
      <input type="text" id="joinId" placeholder="🔗 Zalijepi kod i pritisni Enter" style="width:100%; margin:10px 0">
      <div id="multiStatus" class="status">Niste povezani</div>
      <div id="myIdDisplay" style="font-size:12px; margin:10px 0"></div>
      <button id="copyBtnMulti" style="display:none" onclick="copyCodeMulti()">📋 Kopiraj kod</button>
      <button class="back-btn" onclick="backToMain()">← Nazad</button>
    </div>
  </div>

  <!-- GAME UI (shared) -->
  <div id="gameUI" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <button id="exitGameBtn" onclick="exitToMenu()" style="background:#ef4444; padding:8px 16px;">✖ Izlaz</button>
      <h2 id="gameModeTitle" style="margin:0"></h2>
      <div style="width:60px"></div>
    </div>
    <div id="turn" style="text-align:center; font-size:1.3rem; font-weight:bold; margin:10px 0"></div>
    <div id="players"></div>
    
    <div class="control-group">
      <input type="number" id="scoreInput" placeholder="Poeni (0-180)" value="">
      <label class="check-label">
        <input type="checkbox" id="doubleCheck"> Double Out
      </label>
      <button onclick="submitTurn()" id="submitBtn">🎯 Igraj</button>
    </div>
    <div class="status" id="gameStatus"></div>
  </div>
</div>

<audio id="winSound" preload="auto">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3" type="audio/mpeg">
</audio>

<script>
// ==================== GLOBAL STATE ====================
let currentMode = null; // 'single1', 'single2', 'multi'
let peer = null;
let remoteConn = null;
let myPeerId = null;
let isMyTurn = true;
let localPlayerIndex = 0; // 0 = player1, 1 = player2 (za multiplayer)

// Game data structure
let gameData = {
  players: [
    { score: 501, legs: 0, sets: 0, darts: 0, total: 0, s100: 0, s140: 0, s180: 0 },
    { score: 501, legs: 0, sets: 0, darts: 0, total: 0, s100: 0, s140: 0, s180: 0 }
  ],
  turn: 0,  // 0 or 1
  gameActive: true
};

// ==================== UI HELPERS ====================
function hideAllMenus() {
  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('singleMenu').classList.add('hidden');
  document.getElementById('multiMenu').classList.add('hidden');
  document.getElementById('gameUI').classList.add('hidden');
}

function backToMain() {
  // Disconnect multiplayer if active
  if (currentMode === 'multi' && remoteConn) {
    try { remoteConn.close(); } catch(e) {}
    if (peer) { peer.destroy(); }
  }
  currentMode = null;
  hideAllMenus();
  document.getElementById('mainMenu').classList.remove('hidden');
}

function exitToMenu() {
  backToMain();
}

function showSingleplayerMenu() {
  hideAllMenus();
  document.getElementById('singleMenu').classList.remove('hidden');
}

function showMultiplayerMenu() {
  hideAllMenus();
  document.getElementById('multiMenu').classList.remove('hidden');
  // Initialize peer for multiplayer
  if (peer) {
    try { peer.destroy(); } catch(e) {}
  }
  peer = new Peer();
  peer.on('open', (id) => {
    myPeerId = id;
    document.getElementById('myIdDisplay').innerHTML = `🔑 Tvoj kod: <strong>${id}</strong>`;
    document.getElementById('copyBtnMulti').style.display = 'inline-block';
    document.getElementById('multiStatus').innerHTML = '✅ Spreman za povezivanje';
  });
  
  peer.on('connection', (conn) => {
    remoteConn = conn;
    document.getElementById('multiStatus').innerHTML = '🔗 Igrač spojen! Pokrećem igru...';
    setupMultiplayerConnection(conn);
    startMultiplayerGameAsHost();
  });
}

function copyCodeMulti() {
  if (myPeerId) {
    navigator.clipboard.writeText(myPeerId);
    document.getElementById('multiStatus').innerHTML = '📋 Kod kopiran! Pošalji prijatelju.';
    setTimeout(() => {
      if (currentMode !== 'multi') return;
      document.getElementById('multiStatus').innerHTML = '✅ Spreman za povezivanje';
    }, 2000);
  }
}

// ==================== SINGLEPLAYER ====================
function startSingleplayer(playerCount) {
  hideAllMenus();
  document.getElementById('gameUI').classList.remove('hidden');
  
  if (playerCount === 1) {
    currentMode = 'single1';
    document.getElementById('gameModeTitle').innerHTML = '🎮 VS AI';
    // Reset game
    resetGame();
    isMyTurn = true;
    gameData.turn = 0;
    renderGameUI();
    document.getElementById('gameStatus').innerHTML = 'Tvoj potez!';
  } else {
    currentMode = 'single2';
    document.getElementById('gameModeTitle').innerHTML = '👥 2 Igrača (Hot Seat)';
    resetGame();
    gameData.turn = 0;
    isMyTurn = true;
    renderGameUI();
    document.getElementById('gameStatus').innerHTML = 'Igrač 1 na potezu';
  }
  enableInput(true);
}

function resetGame() {
  gameData = {
    players: [
      { score: 501, legs: 0, sets: 0, darts: 0, total: 0, s100: 0, s140: 0, s180: 0 },
      { score: 501, legs: 0, sets: 0, darts: 0, total: 0, s100: 0, s140: 0, s180: 0 }
    ],
    turn: 0,
    gameActive: true
  };
}

// AI LOGIC (jednostavan, baca 20-100 poena)
function aiTurn() {
  if (currentMode !== 'single1') return;
  if (gameData.turn !== 1) return;
  if (!gameData.gameActive) return;
  
  setTimeout(() => {
    if (currentMode !== 'single1' || gameData.turn !== 1) return;
    // AI baca između 20 i 100, s povremenim 180
    let rand = Math.random();
    let points;
    if (rand < 0.05) points = 180;
    else if (rand < 0.15) points = 140;
    else if (rand < 0.3) points = 100;
    else points = Math.floor(Math.random() * 81) + 20;
    
    applyScore(points, true);
    renderGameUI();
    
    if (gameData.gameActive && gameData.turn === 1 && currentMode === 'single1') {
      document.getElementById('gameStatus').innerHTML = '🤖 AI razmišlja...';
    }
  }, 400);
}

// ==================== MULTIPLAYER ====================
function setupMultiplayerConnection(conn) {
  conn.on('data', (data) => {
    gameData = data;
    renderGameUI();
    // Update turn status
    isMyTurn = (gameData.turn === localPlayerIndex);
    enableInput(isMyTurn && gameData.gameActive);
    if (!gameData.gameActive) return;
    if (gameData.turn === localPlayerIndex) {
      document.getElementById('gameStatus').innerHTML = '🎯 Tvoj potez!';
    } else {
      document.getElementById('gameStatus').innerHTML = '⏳ Čekam protivnika...';
    }
  });
  
  conn.on('close', () => {
    document.getElementById('gameStatus').innerHTML = '❌ Veza prekinuta! Vraćam se u menu.';
    setTimeout(() => backToMain(), 2000);
  });
}

function startMultiplayerGameAsHost() {
  currentMode = 'multi';
  localPlayerIndex = 0; // host je player 1
  resetGame();
  gameData.turn = 0;
  isMyTurn = true;
  hideAllMenus();
  document.getElementById('gameUI').classList.remove('hidden');
  document.getElementById('gameModeTitle').innerHTML = '🌐 Multiplayer (Ti si P1)';
  renderGameUI();
  enableInput(true);
  document.getElementById('gameStatus').innerHTML = 'Čekam potez... Ti si prvi!';
  sendGameData();
}

function joinMultiplayerGame(opponentId) {
  if (!peer) {
    peer = new Peer();
    peer.on('open', () => {
      connectToPeer(opponentId);
    });
  } else {
    connectToPeer(opponentId);
  }
}

function connectToPeer(opponentId) {
  remoteConn = peer.connect(opponentId);
  remoteConn.on('open', () => {
    currentMode = 'multi';
    localPlayerIndex = 1; // koji se spaja je player 2
    resetGame();
    gameData.turn = 0;
    isMyTurn = false;
    hideAllMenus();
    document.getElementById('gameUI').classList.remove('hidden');
    document.getElementById('gameModeTitle').innerHTML = '🌐 Multiplayer (Ti si P2)';
    renderGameUI();
    enableInput(false);
    document.getElementById('gameStatus').innerHTML = '⏳ Čekam potez... Protivnik počinje.';
    sendGameData();
  });
  
  remoteConn.on('data', (data) => {
    gameData = data;
    renderGameUI();
    isMyTurn = (gameData.turn === localPlayerIndex);
    enableInput(isMyTurn && gameData.gameActive);
    if (gameData.turn === localPlayerIndex) {
      document.getElementById('gameStatus').innerHTML = '🎯 Tvoj potez!';
    } else {
      document.getElementById('gameStatus').innerHTML = '⏳ Čekam protivnika...';
    }
  });
  
  remoteConn.on('close', () => {
    document.getElementById('gameStatus').innerHTML = '❌ Protivnik je napustio.';
    setTimeout(() => backToMain(), 2000);
  });
}

function sendGameData() {
  if (currentMode === 'multi' && remoteConn && remoteConn.open) {
    remoteConn.send(gameData);
  }
}

// ==================== CORE GAME LOGIC ====================
function applyScore(points, isFromAI = false) {
  if (!gameData.gameActive) return false;
  
  let p = gameData.players[gameData.turn];
  let newScore = p.score - points;
  
  // Invalid score check
  if (points > 180) return false;
  if (newScore < 0 || newScore === 1) {
    // bust - gubi potez
    nextTurn();
    return false;
  }
  
  // Check win (double out condition)
  if (newScore === 0) {
    let doubleCheck = document.getElementById('doubleCheck');
    if (!doubleCheck.checked && currentMode !== 'single1') {
      // nije uključen double out - ne može završiti
      return false;
    }
    if (currentMode === 'single1' && gameData.turn === 1 && !doubleCheck.checked) {
      // AI također poštuje double out? za jednostavnost, AI može završiti samo ako je uključen
      if (!doubleCheck.checked) return false;
    }
    
    // WIN!
    p.legs++;
    if (p.legs >= 3) {
      p.sets++;
      p.legs = 0;
    }
    playWinSound();
    // Reset scores for next leg
    gameData.players.forEach(pl => {
      pl.score = 501;
    });
    renderGameUI();
    nextTurn();
    return true;
  }
  
  // Update stats
  if (points >= 100) p.s100++;
  if (points >= 140) p.s140++;
  if (points === 180) p.s180++;
  
  p.score = newScore;
  p.total += points;
  p.darts += 3;
  
  nextTurn();
  return true;
}

function nextTurn() {
  gameData.turn = (gameData.turn + 1) % 2;
  // Reset double out checkbox for new turn
  const doubleCheckbox = document.getElementById('doubleCheck');
  if (doubleCheckbox) doubleCheckbox.checked = false;
  document.getElementById('scoreInput').value = '';
  
  renderGameUI();
  
  if (currentMode === 'multi') {
    isMyTurn = (gameData.turn === localPlayerIndex);
    enableInput(isMyTurn);
    sendGameData();
    if (isMyTurn) document.getElementById('gameStatus').innerHTML = '🎯 Tvoj potez!';
    else document.getElementById('gameStatus').innerHTML = '⏳ Čekam protivnika...';
  } 
  else if (currentMode === 'single2') {
    enableInput(true);
    let playerName = gameData.turn === 0 ? "Igrač 1" : "Igrač 2";
    document.getElementById('gameStatus').innerHTML = `${playerName} na potezu`;
  }
  else if (currentMode === 'single1') {
    if (gameData.turn === 0) {
      enableInput(true);
      document.getElementById('gameStatus').innerHTML = '🎯 Tvoj potez!';
    } else {
      enableInput(false);
      document.getElementById('gameStatus').innerHTML = '🤖 AI razmišlja...';
      aiTurn();
    }
  }
}

function submitTurn() {
  if (currentMode === 'multi' && (!remoteConn || !remoteConn.open)) {
    document.getElementById('gameStatus').innerHTML = '❌ Veza izgubljena';
    return;
  }
  
  if (currentMode === 'single1' && gameData.turn !== 0) {
    alert('Sada je AI na potezu!');
    return;
  }
  if (currentMode === 'multi' && gameData.turn !== localPlayerIndex) {
    alert('Nije tvoj potez!');
    return;
  }
  
  let val = parseInt(document.getElementById('scoreInput').value);
  if (isNaN(val) || val < 0) val = 0;
  if (val > 180) {
    alert('Maksimalno 180 poena!');
    return;
  }
  
  applyScore(val, false);
  
  if (currentMode === 'multi') {
    sendGameData();
  }
  renderGameUI();
}

function enableInput(enabled) {
  const submitBtn = document.getElementById('submitBtn');
  const scoreInp = document.getElementById('scoreInput');
  const doubleCh = document.getElementById('doubleCheck');
  if (submitBtn) submitBtn.disabled = !enabled;
  if (scoreInp) scoreInp.disabled = !enabled;
  if (doubleCh && currentMode !== 'multi') doubleCh.disabled = !enabled;
  if (currentMode === 'multi' && doubleCh) doubleCh.disabled = !enabled;
}

function playWinSound() {
  let sound = document.getElementById('winSound');
  if (sound) {
    sound.currentTime = 0;
    sound.play().catch(e => console.log("Audio play failed"));
  }
}

function renderGameUI() {
  let playersDiv = document.getElementById('players');
  if (!playersDiv) return;
  
  let html = '';
  gameData.players.forEach((p, idx) => {
    let avg = p.darts ? ((p.total / p.darts) * 3).toFixed(1) : 0;
    let isActive = (gameData.turn === idx && gameData.gameActive);
    let playerName = (currentMode === 'single1' && idx === 1) ? '🤖 AI' : `P${idx+1}`;
    if (currentMode === 'single2') playerName = `👤 Igrač ${idx+1}`;
    if (currentMode === 'multi') playerName = (idx === 0) ? '🌍 Igrač 1' : '🌍 Igrač 2';
    
    html += `<div class="player ${isActive ? 'active' : ''}">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h3>${playerName}</h3>
        <span class="leg-set">🏆 Legs:${p.legs} | Sets:${p.sets}</span>
      </div>
      <div style="text-align:center">
        <span class="score">${p.score}</span>
      </div>
      <div class="stats">
        <span>💯 100+: ${p.s100}</span>
        <span>🔥 140+: ${p.s140}</span>
        <span>💥 180: ${p.s180}</span>
        <span>📊 Avg: ${avg}</span>
      </div>
    </div>`;
  });
  playersDiv.innerHTML = html;
  
  let turnText = '';
  if (gameData.gameActive) {
    if (currentMode === 'single1') turnText = gameData.turn === 0 ? '👉 TVOJ POTEZ' : '🤖 AI POTEZ';
    else if (currentMode === 'single2') turnText = `👉 Igrač ${gameData.turn+1} na redu`;
    else turnText = `👉 Igrač ${gameData.turn+1}`;
  } else turnText = 'Igra gotova';
  document.getElementById('turn').innerHTML = turnText;
}

function createGame() {
  // Already have peer from showMultiplayerMenu, just show status
  document.getElementById('multiStatus').innerHTML = '🔍 Čekam igrača da se spoji... Tvoj kod dolje ⬇️';
}

// Join multiplayer via enter
document.addEventListener('DOMContentLoaded', () => {
  const joinField = document.getElementById('joinId');
  if (joinField) {
    joinField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        let code = e.target.value.trim();
        if (code) {
          joinMultiplayerGame(code);
        }
      }
    });
  }
  
  // Global enter za submit u igri
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !document.getElementById('gameUI').classList.contains('hidden')) {
      let active = document.activeElement;
      if (active && active.id !== 'joinId' && active.id !== 'scoreInput') {
        submitTurn();
      } else if (active && active.id === 'scoreInput') {
        submitTurn();
      }
    }
  });
});
</script>
</body>
</html>
