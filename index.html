<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dart Pro P2P</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
body { font-family: Arial; text-align:center; background:#0f172a; color:#fff; }
.player { background:#1e293b; margin:10px; padding:15px; border-radius:15px; }
.active { border:3px solid #22c55e; }
.score { font-size:60px; }
button { padding:10px; margin:5px; border-radius:10px; }
.keypad { display:flex; flex-wrap:wrap; justify-content:center; max-width:360px; margin:auto; }
.keypad button { width:60px; }
</style>
</head>
<body>

<h1>🎯 Dart Pro P2P</h1>

<div>
<button onclick="createGame()">Create Game</button>
<input id="joinId" placeholder="Enter code">
<button onclick="joinGame()">Join</button>
</div>

<h3 id="myId"></h3>

<div id="game" style="display:none">
  <h2 id="turn"></h2>
  <div id="players"></div>

  <input id="d1" placeholder="D1">
  <input id="d2" placeholder="D2">
  <input id="d3" placeholder="D3">
  <br/>
  <button onclick="setMult(1)">S</button>
  <button onclick="setMult(2)">D</button>
  <button onclick="setMult(3)">T</button>
  <br/>
  <label>Last dart double <input type="checkbox" id="doubleCheck"></label>
  <br/>
  <button onclick="submitTurn()">Submit</button>
</div>

<div class="keypad" id="keypad"></div>

<script>
let peer = new Peer();
let conn;
let isHost = false;
let multiplier = 1;

let gameState = {
  players:[createPlayer(),createPlayer()],
  turn:0
};

function createPlayer(){
  return {score:501,total:0,darts:0,legs:0,sets:0};
}

peer.on('open', id => {
  document.getElementById('myId').innerText = "Your code: " + id;
});

function createGame(){
  isHost = true;
  document.getElementById('game').style.display='block';
}

function joinGame(){
  const id = document.getElementById('joinId').value;
  conn = peer.connect(id);

  conn.on('open', ()=>{
    document.getElementById('game').style.display='block';
  });

  conn.on('data', data=>{
    gameState = data;
    render();
  });
}

peer.on('connection', c => {
  conn = c;
  conn.on('data', data=>{
    gameState = data;
    render();
  });
});

function sendState(){
  if(conn) conn.send(gameState);
}

function render(){
  document.getElementById('turn').innerText = 'Player ' + (gameState.turn+1);

  let html='';
  gameState.players.forEach((p,i)=>{
    let avg = p.darts ? ((p.total/p.darts)*3).toFixed(2) : 0;
    html+=`<div class="player ${i===gameState.turn?'active':''}">
      <h3>P${i+1}</h3>
      <div class="score">${p.score}</div>
      <div>Legs:${p.legs} Sets:${p.sets}</div>
      <div>Avg:${avg}</div>
    </div>`;
  });
  document.getElementById('players').innerHTML = html;
}

function setMult(m){ multiplier=m; }

function fill(val){
  val*=multiplier;
  multiplier=1;
  if(!d1.value) d1.value=val;
  else if(!d2.value) d2.value=val;
  else d3.value=val;
}

function submitTurn(){
  let v1=+d1.value||0;
  let v2=+d2.value||0;
  let v3=+d3.value||0;

  let p=gameState.players[gameState.turn];
  let total=v1+v2+v3;
  let newScore=p.score-total;

  if(newScore<0 || newScore===1){
    gameState.turn=(gameState.turn+1)%2;
    update();
    return;
  }

  if(newScore===0){
    if(!doubleCheck.checked) return;

    p.legs++;
    if(p.legs>=3){ p.sets++; p.legs=0; }

    gameState.players.forEach(pl=>pl.score=501);
    update();
    return;
  }

  p.score=newScore;
  p.total+=total;
  p.darts+=3;

  gameState.turn=(gameState.turn+1)%2;

  update();
}

function update(){
  d1.value=''; d2.value=''; d3.value='';
  doubleCheck.checked=false;
  render();
  sendState();
}

for(let i=1;i<=20;i++){
  let b=document.createElement('button');
  b.innerText=i;
  b.onclick=()=>fill(i);
  keypad.appendChild(b);
}

[25,50].forEach(v=>{
  let b=document.createElement('button');
  b.innerText=v;
  b.onclick=()=>fill(v);
  keypad.appendChild(b);
});

window.addEventListener('keydown',e=>{
  if(e.key==='Enter') submitTurn();
});
</script>

</body>
</html>
