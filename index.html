<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dart Pro Scorer</title>
<style>
body { font-family: Arial; text-align:center; background:#0f172a; color:#fff; }
h1 { margin:20px; }
.players { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
.player { background:#1e293b; padding:20px; border-radius:20px; width:220px; }
.active { border:3px solid #22c55e; }
.score { font-size:70px; font-weight:bold; }
.small { font-size:14px; opacity:0.8; }
.inputs { margin-top:20px; }
input { width:80px; padding:12px; font-size:20px; margin:5px; text-align:center; border-radius:10px; border:none; }
button { padding:10px 14px; margin:5px; border:none; border-radius:10px; background:#22c55e; font-weight:bold; cursor:pointer; }
.keypad { display:flex; flex-wrap:wrap; justify-content:center; max-width:300px; margin:10px auto; }
.keypad button { width:60px; }
</style>
</head>
<body>

<h1>🎯 Dart Pro Scorer</h1>

<div id="players" class="players"></div>

<div class="inputs">
  <input id="d1" placeholder="Dart 1">
  <input id="d2" placeholder="Dart 2">
  <input id="d3" placeholder="Dart 3">
  <br/>
  <label>Last dart was double <input type="checkbox" id="doubleCheck"></label>
  <br/>
  <button onclick="submitTurn()">Submit (Enter)</button>
  <button onclick="undo()">Undo</button>
</div>

<div class="keypad" id="keypad"></div>

<script>
let players = [createPlayer(), createPlayer()];
let currentPlayer = 0;
let history = [];

function createPlayer(){
  return {score:501,darts:0,legs:0,sets:0};
}

function render(){
  const container=document.getElementById('players');
  container.innerHTML='';
  players.forEach((p,i)=>{
    container.innerHTML+=`
    <div class="player ${i===currentPlayer?'active':''}">
      <h3>Player ${i+1}</h3>
      <div class="score">${p.score}</div>
      <div class="small">Legs: ${p.legs} | Sets: ${p.sets}</div>
      <div class="small">Avg: ${p.darts?((501-p.score)/p.darts).toFixed(2):0}</div>
    </div>`;
  });
}

function submitTurn(){
  let v1=+d1El.value||0;
  let v2=+d2El.value||0;
  let v3=+d3El.value||0;

  let total=v1+v2+v3;
  let player=players[currentPlayer];

  history.push(JSON.parse(JSON.stringify(players)));

  let newScore=player.score-total;

  if(newScore<0 || newScore===1){ next(); clearInputs(); return; }

  if(newScore===0){
    if(!doubleCheck.checked){ next(); clearInputs(); return; }

    player.score=0;
    player.legs++;
    player.darts+=3;

    if(player.legs>=3){
      player.sets++;
      player.legs=0;
      alert(`Player ${currentPlayer+1} wins SET!`);
    } else {
      alert(`Player ${currentPlayer+1} wins LEG!`);
    }

    resetLeg();
    return;
  }

  player.score=newScore;
  player.darts+=3;

  clearInputs();
  next();
}

function resetLeg(){
  players.forEach(p=>p.score=501);
  clearInputs();
  render();
}

function undo(){
  if(history.length>0){
    players=history.pop();
    currentPlayer=(currentPlayer-1+players.length)%players.length;
    render();
  }
}

function next(){
  currentPlayer=(currentPlayer+1)%players.length;
  render();
}

function clearInputs(){
  d1El.value=''; d2El.value=''; d3El.value='';
  doubleCheck.checked=false;
}

// keypad
const keypad=document.getElementById('keypad');
[1,5,20,25,50,60].forEach(v=>{
  let btn=document.createElement('button');
  btn.innerText=v;
  btn.onclick=()=>fillInput(v);
  keypad.appendChild(btn);
});

function fillInput(val){
  if(!d1El.value) d1El.value=val;
  else if(!d2El.value) d2El.value=val;
  else d3El.value=val;
}

// enter
const d1El=document.getElementById('d1');
const d2El=document.getElementById('d2');
const d3El=document.getElementById('d3');
const doubleCheck=document.getElementById('doubleCheck');

document.addEventListener('keydown',e=>{
  if(e.key==='Enter') submitTurn();
});

render();
</script>

</body>
</html>
