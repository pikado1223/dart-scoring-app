<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dart Pro Scorer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color: #fff;
      margin:0;
    }
    h1 { margin: 20px; }
    .players {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      padding:10px;
    }
    .player {
      background:#1e293b;
      padding:20px;
      border-radius:20px;
      width:220px;
      box-shadow:0 10px 20px rgba(0,0,0,0.3);
      transition:0.2s;
    }
    .active { border:3px solid #22c55e; transform:scale(1.05); }
    .score {
      font-size:60px;
      font-weight:bold;
      margin:10px 0;
    }
    .controls {
      margin-top:20px;
    }
    input, select {
      padding:12px;
      margin:5px;
      font-size:18px;
      border-radius:10px;
      border:none;
      text-align:center;
    }
    button {
      padding:12px 20px;
      margin:5px;
      cursor:pointer;
      border-radius:10px;
      border:none;
      font-size:16px;
      background:#22c55e;
      color:#000;
      font-weight:bold;
    }
    button:hover { opacity:0.9; }
  </style>
</head>
<body>

<h1>🎯 Dart Pro Scorer (501 Double Out)</h1>

<div>
  Players:
  <select id="playerCount" onchange="setupPlayers()">
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
  </select>
</div>

<div id="players" class="players"></div>

<div class="controls">
  <input id="points" type="number" placeholder="Points" />
  <select id="multiplier">
    <option value="1">Single</option>
    <option value="2">Double</option>
    <option value="3">Triple</option>
  </select>
  <br/>
  <button onclick="addScore()">Submit (Enter)</button>
  <button onclick="resetGame()">Reset</button>
</div>

<script>
let players = [];
let currentPlayer = 0;

function setupPlayers() {
  const count = parseInt(document.getElementById('playerCount').value);
  players = [];
  for (let i = 0; i < count; i++) {
    players.push({ score: 501, darts: 0 });
  }
  currentPlayer = 0;
  render();
}

function render() {
  const container = document.getElementById('players');
  container.innerHTML = '';
  players.forEach((p, i) => {
    container.innerHTML += `
      <div class="player ${i===currentPlayer?'active':''}">
        <h3>Player ${i+1}</h3>
        <div class="score">${p.score}</div>
        <div>Avg: ${p.darts ? ((501 - p.score) / p.darts).toFixed(2) : 0}</div>
      </div>
    `;
  });
}

function addScore() {
  const val = parseInt(document.getElementById('points').value);
  const mult = parseInt(document.getElementById('multiplier').value);
  if (isNaN(val)) return;

  let player = players[currentPlayer];
  let throwScore = val * mult;
  let newScore = player.score - throwScore;

  if (newScore < 0 || newScore === 1) {
    nextPlayer();
    return;
  }

  if (newScore === 0 && mult !== 2) {
    nextPlayer();
    return;
  }

  player.score = newScore;
  player.darts++;

  if (newScore === 0) {
    alert(`Player ${currentPlayer+1} wins!`);
  }

  document.getElementById('points').value = '';
  nextPlayer();
}

function nextPlayer() {
  currentPlayer = (currentPlayer + 1) % players.length;
  render();
}

function resetGame() {
  setupPlayers();
}

// ENTER key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    addScore();
  }
});

setupPlayers();
</script>

</body>
</html>
