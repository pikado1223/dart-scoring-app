<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dart Pro Online</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
body { font-family: Arial; text-align:center; background:#0f172a; color:#fff; }
.score { font-size:60px; }
.player { margin:10px; padding:15px; background:#1e293b; border-radius:15px; }
.active { border:3px solid #22c55e; }
button { padding:10px; margin:5px; border-radius:10px; }
.keypad { display:flex; flex-wrap:wrap; justify-content:center; max-width:360px; margin:auto; }
.keypad button { width:60px; }
</style>
</head>
<body>

<h1>🎯 Dart Pro Online</h1>

<div>
Room: <input id="roomId">
<button onclick="joinRoom()">Join</button>
</div>

<div id="game" style="display:none">
  <h2 id="turn"></h2>
  <div id="players"></div>

  <div>
    <input id="d1" placeholder="D1">
    <input id="d2" placeholder="D2">
    <input id="d3" placeholder="D3">
  </div>

  <div>
    <button onclick="setMult(1)">S</button>
    <button onclick="setMult(2)">D</button>
    <button onclick="setMult(3)">T</button>
  </div>

  <label>Last dart double <input type="checkbox" id="doubleCheck"></label>

  <div>
    <button onclick="submitTurn()">Submit</button>
    <button onclick="undo()">Undo</button>
  </div>

  <div class="keypad" id="keypad"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_APP.firebaseapp.com",
  databaseURL: "https://YOUR_APP.firebaseio.com",
  projectId: "YOUR_APP",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomRef;
let multiplier = 1;
let history = [];

function joinRoom(){
  const room = document.getElementById('roomId').value;
  roomRef = db.ref('rooms/' + room);

  roomRef.on('value', snap => {
    const data = snap.val();
    if(!data) return;
    document.getElementById('game').style.display='block';
    render(data);
  });

  roomRef.once('value').then(snap=>{
    if(!snap.exists()){
      roomRef.set({
        players:[createPlayer(),createPlayer()],
        turn:0
      });
    }
  });
}

function createPlayer(){
  return {score:501,total:0,darts:0,legs:0,sets:0};
}

function render(data){
  document.getElementById('turn').innerText = 'Player ' + (data.turn+1);

  let html='';
  data.players.forEach((p,i)=>{
    let avg = p.darts ? ((p.total/p.darts)*3).toFixed(2) : 0;
    html+=`<div class="player ${i===data.turn?'active':''}">
      <h3>P${i+1}</h3>
      <div class="score">${p.score}</div>
      <div>Legs:${p.legs} Sets:${p.sets}</div>
      <div>Avg:${avg}</div>
    </div>`;
  });
  document.getElementById('players').innerHTML = html;
}

function setMult(m){ multiplier=m; }

function fill(val){
  val*=multiplier;
  multiplier=1;
  if(!d1.value) d1.value=val;
  else if(!d2.value) d2.value=val;
  else d3.value=val;
}

function submitTurn(){
  const v1=+d1.value||0;
  const v2=+d2.value||0;
  const v3=+d3.value||0;

  roomRef.transaction(data=>{
    if(!data) return;

    let p=data.players[data.turn];
    let total=v1+v2+v3;
    let newScore=p.score-total;

    if(newScore<0 || newScore===1) {
      data.turn=(data.turn+1)%2;
      return data;
    }

    if(newScore===0){
      if(!doubleCheck.checked) return data;

      p.legs++;
      if(p.legs>=3){ p.sets++; p.legs=0; }

      data.players.forEach(pl=>pl.score=501);
      return data;
    }

    p.score=newScore;
    p.total+=total;
    p.darts+=3;

    data.turn=(data.turn+1)%2;
    return data;
  });

  d1.value=''; d2.value=''; d3.value='';
}

function undo(){ alert('Undo not supported online yet'); }

for(let i=1;i<=20;i++){
  let b=document.createElement('button');
  b.innerText=i;
  b.onclick=()=>fill(i);
  keypad.appendChild(b);
}

[25,50].forEach(v=>{
  let b=document.createElement('button');
  b.innerText=v;
  b.onclick=()=>fill(v);
  keypad.appendChild(b);
});

// enter
window.addEventListener('keydown',e=>{
  if(e.key==='Enter') submitTurn();
});
</script>

</body>
</html>
