<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dart P2P Final+</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
body { font-family: Arial; text-align:center; background:#0f172a; color:#fff; margin:0; }
h1 { margin-top:10px; }
.player { background:#1e293b; margin:10px; padding:15px; border-radius:15px; transition:0.3s; }
.active { border:3px solid #22c55e; transform:scale(1.05); }
.score { font-size:64px; font-weight:bold; }
.stats { font-size:13px; opacity:0.8; margin-top:5px; }
button { padding:12px; margin:5px; border-radius:12px; cursor:pointer; font-size:16px; }
input { padding:12px; border-radius:12px; border:none; text-align:center; font-size:16px; }
.status { margin-top:10px; font-size:14px; opacity:0.8; }
.container { max-width:400px; margin:auto; }
</style>
</head>
<body>

<div class="container">
<h1>🎯 Dart P2P</h1>

<div>
<button onclick="createGame()">Create Game</button>
<br/><br/>
<input id="joinId" placeholder="Paste code & press Enter">
</div>

<h3 id="myId"></h3>
<button id="copyBtn" style="display:none" onclick="copyCode()">Copy Code</button>
<div class="status" id="status">Not connected</div>
<div class="status" id="role"></div>

<div id="game" style="display:none">
  <h2 id="turn"></h2>
  <div id="players"></div>

  <input id="scoreInput" placeholder="Score (0-180)">
  <br/>
  <label>Double out <input type="checkbox" id="doubleCheck"></label>
  <br/>
  <button onclick="play()">Submit</button>
</div>
</div>

<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
let peer = new Peer();
let conn;
let playerIndex = 0;
let myCode = '';

let game = {
  players:[createPlayer(),createPlayer()],
  turn:0
};

function createPlayer(){ 
  return {
    score:501,
    legs:0,
    sets:0,
    darts:0,
    total:0,
    s100:0,
    s140:0,
    s180:0
  }; 
}

peer.on('open', id=>{
  myCode = id;
  myId.innerText = "Share this code: " + id;
  copyBtn.style.display='inline-block';
});

function copyCode(){
  navigator.clipboard.writeText(myCode);
  status.innerText = "Code copied!";
}

function createGame(){
  playerIndex = 0;
  role.innerText = "You are Player 1";
  showGame();
}

function joinGame(id){
  playerIndex = 1;
  role.innerText = "You are Player 2";
  conn = peer.connect(id);

  conn.on('open', ()=>{
    status.innerText = "Connected";
    showGame();
  });

  conn.on('data', data=>{
    game = data;
    render();
  });
}

peer.on('connection', c=>{
  conn = c;
  status.innerText = "Player connected";
  conn.on('data', data=>{
    game = data;
    render();
  });
});

function showGame(){
  document.getElementById('game').style.display='block';
  render();
}

function send(){ if(conn) conn.send(game); }

function render(){
  turn.innerText = "Player " + (game.turn+1);

  let html='';
  game.players.forEach((p,i)=>{
    let avg = p.darts ? ((p.total/p.darts)*3).toFixed(2) : 0;
    html+=`<div class="player ${i===game.turn?'active':''}">
      <h3>P${i+1}</h3>
      <div class="score">${p.score}</div>
      <div>Legs:${p.legs} Sets:${p.sets}</div>
      <div class="stats">
        100+: ${p.s100} | 140+: ${p.s140} | 180: ${p.s180}<br>
        Avg: ${avg}
      </div>
    </div>`;
  });

  players.innerHTML = html;
  scoreInput.disabled = (game.turn !== playerIndex);
}

function play(){
  if(game.turn !== playerIndex) return;

  let val = +scoreInput.value || 0;

  // 🔥 max 180 limit
  if(val > 180){
    alert('Max score is 180');
    return;
  }

  let p = game.players[game.turn];
  let newScore = p.score - val;

  if(newScore < 0 || newScore === 1){ next(); return; }

  if(newScore === 0){
    if(!doubleCheck.checked) return;

    p.legs++;
    if(p.legs>=3){ p.sets++; p.legs=0; }

    document.getElementById('winSound').play();

    game.players.forEach(pl=>pl.score=501);
    send(); render();
    return;
  }

  // 📊 stats update
  if(val >= 100) p.s100++;
  if(val >= 140) p.s140++;
  if(val === 180) p.s180++;

  p.score = newScore;
  p.total += val;
  p.darts += 3;

  next();
}

function next(){
  game.turn = (game.turn+1)%2;
  scoreInput.value='';
  doubleCheck.checked=false;
  send();
  render();
}

// JOIN ENTER
document.getElementById('joinId').addEventListener('keydown', e=>{
  if(e.key==='Enter') joinGame(e.target.value);
});

// submit ENTER
window.addEventListener('keydown',e=>{
  if(e.key==='Enter' && document.activeElement.id !== 'joinId') play();
});
</script>

</body>
</html>
